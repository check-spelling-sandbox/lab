  desc: |
    Blog from the Vienna-based information-architecture consultancy Little Helper; posts explore information architecture, content modeling, and building frustration-free content experiences via structured content design.

- name: Liz Argall
  site: https://lizargall.github.io/blog
  feed: https://lizargall.github.io/blog/rss.xml
  type: RSS
  tags: [technical-writing, community, mentoring]
  desc: |
    The blog of an international community-building tech writer and mentor/coach.
    Posts ponder aspects of the craft like communication and collaboration.

- name: Paligo Blog
  site: https://paligo.net/blog/
  feed: https://paligo.net/feed
  type: RSS
  tags: [tech-comm, content-management, content-strategy, ai, ia]
  desc: |
    Company blog of the Paligo CCMS, providing technical communication professionals with expert guidance on creating efficient, scalable documentation systems.
    Topics include structured content (CCMS) workflows, information architecture, knowledge management, AI-ready documentation, and strategies to improve content quality.

- name: Passo Uno
  site: https://passo.uno
  feed: https://passo.uno/posts/index.xml
  type: Atom
  tags: [technical-writing, ai, industry-news]
  desc: |
    Personal site of Fabrizio Ferri Benedetti (UX/technical writer) featuring editorial pieces and in-depth discussions about the current state of technical writing, documentation “experiments”, and the impact of AI on our industry.

- name: Read the Docs (Company Blog)
  site: https://about.readthedocs.com/blog/
  feed: https://about.readthedocs.com/feeds/atom.xml
  type: Atom
  tags: [open-source, ssg, community]
  desc: |
    Blog from Read the Docs (a popular documentation hosting platform) covering platform updates, open source doc projects, static site generator news, and community announcements in the docs-as-code ecosystem.

- name: Robert Delwood
  site: https://robertdelwood.medium.com
  feed: https://medium.com/feed/@robertdelwood
  type: RSS
  tags: [technical-writing, api-docs, programming, automation]
  desc: |
    The Medium "stories" of a professional API documentation writer, programmer, and former NASA engineer.

- name: Sarah Deaton
  site: https://sdeaton.com
  feed: https://sdeaton.com/rss.xml
  type: RSS
  tags: [ai]
  desc: |
    Sarah's deep and practical analysis of AI tools and techniques as they apply to content and software.

- name: Story Needle
  site: https://storyneedle.com
  feed: https://storyneedle.com/feed
  type: RSS
  tags: [ai, content-strategy, content-modeling, content-management]
  desc: |
    A massive compendium of articles by content strategist Michael Andrews, author of numerous https://storyneedle.com/books-content-strategy/[books such as _No More Silos_ and _Metadata Basics for Web Content_].

- name: Tech Docs
  site: https://blog.techdocs.studio
  tags: [technical-writing, docs-as-code, tools, content-strategy]
  desc: |
    David Garcia’s blog about documentation systems and “what breaks them” – discussing the tooling, infrastructure, and content strategy behind successful docs-as-code implementations.

- name: Technically Writing
  site: https://www.dufcrule.com/posts/
  tags: [technical-writing, ai]
  desc: |
    Occasional posts by a Spain-based tech writer named Ian.

- name: technicalwriting.dev
  site: https://technicalwriting.dev
  # feed: https://technicalwriting.dev/rss.xml
  tags: [technical-writing, docs-as-code, ssg, open-source, ai]
  desc: |
    Individual blog of a tech writer focusing on developer documentation and tooling, specializing in Sphinx-based docs and static site generators for code projects.
    Includes explorations of AI tools in documentation.

- name: Technical Writing Uncensored
  kind: podcast
  site: https://www.youtube.com/@UncensoredTechWriter
  feed: https://www.youtube.com/feeds/videos.xml?channel_id=UCdzER3fTHLN8mseLA_wtntg
  tags: [tech-comm, best-practices, careers]
  desc: |
    Hosted by Diana Payton, this interview-driven video podcast highlights some of the best minds in technical content.
    Episodes offer candid takes on documentation culture, skills needed for success, and unfiltered advice for tech writers.

- name: TechWhirl
  site: https://techwhirl.com
  feed: https://techwhirl.com/feed
  type: RSS
  tags: [content-management, tech-comm, industry-news]
  desc: |
    Online resource for anyone interested in content management and technical communication; publishes interviews, analysis, and commentary on creating and managing information assets.

- name: The Not-Boring Tech Writer
  kind: podcast
  site: https://thenotboringtechwriter.com
  tags: [tech-comm, careers, best-practices, community]
  desc: |
    A KnowledgeOwl-sponsored podcast (hosted by Kate Mueller) that explores the craft of technical writing in an engaging way.
    Episodes feature interviews with tech writers and documentarians, touching on topics like breaking into the field, knowledge base and community management, documentation best practices, and personal career stories.

- name: This is important
  site: https://www.thisisimportant.net
  feed: https://www.thisisimportant.net/feed
  type: Atom
  tags: [technical-writing, accessibility]
  desc: |
    Blog by Sarah Moir exploring technical writing, documentation, data analysis, ethics in tech and inclusivity.
    Includes both a general feed and a category-specific feed for tech-writing posts.

- name: Write the Docs Newsletter
