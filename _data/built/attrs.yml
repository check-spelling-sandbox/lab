tagline: Bridging the gap between document professionals and the world of code
description: A community resource for free, open-source tools and practices that empower
  technical writers, project managers, paralegals, researchers, and educators to leverage
  modern documentation practices through accessible technologies, strategies, and
  conventions.
docops-box: A Docker-containerized environment and shell script for reducing the complexity
  of setting up “developer tools”. Non-developers can run a single command (`docksh
  run`) and instantly access whole runtimes and specialized documentation tools in
  a pre-configured shell environment.
docs-as-code-school: Structured education in modern technical documentation and document
  processing. Starting with &#8220;Deep Semantics&#8221; (Fall 2025?) and expanding
  to courses on version management, code-like workflow adoption, and legal document
  operations, this project uses docs-as-code to teach docs-as-code principles.
ayl-docstack: AsciiDoc. YAML. Liquid. A three-language approach to managing complex,
  multi-variant documentation. This &#8220;tech stack&#8221; maximizes power while
  minimizing syntax overhead, making advanced documentation techniques accessible
  to beginners while remaining powerful enough for enterprise needs.
schemagraphy: Extends YAML through SGYML and accompanying libraries, providing advanced
  data typing and document transclusion capabilities. Provides a full-featured schema
  language that allows users to define complex data structures, document structures,
  and whole interfaces in a single, unified format.
jekyll-asciidoc-ui: A set of Jekyll plugins and themes that enrich AsciiDoc web output.
  Includes themes like AsciiDocsy and Just The AsciiDocs, plus plugins for Jekyll-OpenAPI
  integration, adocBook document converter, and 25 UI extensions for AsciiDoc.
intro: DocOps Lab is working to distribute the power of docs-as-code for non-programmers.
intro-2: Too many [.role]*technical writers*, [.role]*project managers*, [.role]*paralegals*,
  [.role]*researchers*, and [.role]*educators* are stuck with legacy document tools
  that constrain their potential.
bridge-text: Through several interconnected open source projects, DocOps Lab is creating
  pathways for &#8220;tech-savvy non-programmers&#8221; to harness developer tools.
